<!DOCTYPE html>
<html>
<head>

<title>NEMA Motor Frame Size Chart</title>

<meta name="description" content="Reference chart for common NEMA motor frame sizes and shaft heights.">

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin:0;
}

.container{
background:white;
padding:40px;
max-width:1000px;
margin:auto;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,.1);
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
}

th{
background:#1f2a44;
color:white;
}

</style>

</head>

<body>

<div id="navbar"></div>

<div class="container">

<h1>NEMA Motor Frame Chart</h1>

<p>Common NEMA motor frame sizes with shaft height reference.</p>

<table>

<tr>
<th>Frame</th>
<th>Shaft Height (in)</th>
<th>Typical HP Range</th>
</tr>

<tr><td>56</td><td>3.5</td><td>1/3 - 2 HP</td></tr>
<tr><td>143T</td><td>3.5</td><td>1 - 5 HP</td></tr>
<tr><td>145T</td><td>3.5</td><td>2 - 7.5 HP</td></tr>
<tr><td>182T</td><td>4.5</td><td>7.5 - 15 HP</td></tr>
<tr><td>184T</td><td>4.5</td><td>10 - 20 HP</td></tr>
<tr><td>213T</td><td>5.25</td><td>20 - 30 HP</td></tr>
<tr><td>215T</td><td>5.25</td><td>25 - 40 HP</td></tr>

</table>

</div>

<script>

fetch("navbar.html")
.then(response=>response.text())
.then(data=>{
document.getElementById("navbar").innerHTML=data;
});

</script>

</body>
</html>
