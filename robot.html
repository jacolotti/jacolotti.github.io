<!DOCTYPE html>
<html>
<head>
  <title>Robot Cycle Time Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{
      font-family:Arial;
      background:#f4f4f4;
      text-align:center;
      margin:0;
    }

    .navbar{
      background:#1f2a44;
      padding:15px;
      margin-bottom:40px;
      text-align:left;
    }

    .navbar a{
      color:white;
      margin:0 15px;
      text-decoration:none;
      font-weight:bold;
    }

    .navbar a:hover{
      text-decoration:underline;
      opacity:0.8;
    }

    .container{
      background:white;
      padding:30px;
      max-width:700px;
      margin:auto;
      border-radius:10px;
      box-shadow:0px 0px 10px rgba(0,0,0,.1);
    }

    .container p{
      margin-top:20px;
      margin-bottom:5px;
      font-weight:500;
    }

    input, select{
      width:100%;
      padding:10px;
      margin:10px 0;
      font-size:16px;
      box-sizing:border-box;
      border:1px solid #ccc;
      border-radius:5px;
    }

    button{
      padding:12px 26px;
      font-size:16px;
      background:#1e6bd6;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
      margin-top:15px;
      transition:background .2s;
    }

    button:hover{
      background:#1555ad;
    }

    .result{
      margin-top:25px;
      padding:20px;
      background:#e9f1ff;
      border:1px solid #c8d9ff;
      border-radius:8px;
      font-size:18px;
      line-height:1.6;
      font-weight:500;
    }
  </style>
</head>
<body>

  <div class="navbar">
    <a href="index.html">Home</a>
    <a href="pneumatic.html">Pneumatic</a>
    <a href="robot.html">Robot</a>
    <a href="motor.html">Motor</a>
  </div>

  <div class="container">
    <h2>Robot Cycle Time Calculator</h2>

    <p>Joint Move Distance (mm)</p>
    <input id="jointDistance" type="number" value="1000">

    <p>Linear Move Distance (mm)</p>
    <input id="linearDistance" type="number" value="200">

    <p>Robot Speed (mm/sec)</p>
    <input id="speed" type="number" value="2000">

    <p>Pick Points</p>
    <input id="pickPoints" type="number" value="1">

    <p>Place Points</p>
    <input id="placePoints" type="number" value="1">

    <p>Dwell Time per Point (ms)</p>
    <input id="dwell" type="number" value="100">

    <p>Payload (kg)</p>
    <input id="payload" type="number" value="5">

    <p>Blend / CNT Effect</p>
    <select id="blend">
      <option value="fine">Fine / Stop at point</option>
      <option value="medium">Medium Blend</option>
      <option value="high">High Blend</option>
    </select>

    <p>Acceleration Profile</p>
    <select id="accelProfile">
      <option value="slow">Slow</option>
      <option value="normal">Normal</option>
      <option value="fast">Fast</option>
    </select>

    <button onclick="calculate()">Calculate</button>

    <div class="result" id="output">
      Enter values and press Calculate
    </div>
  </div>

  <script>
    function calculate(){

      let jointDistance = parseFloat(document.getElementById("jointDistance").value);
      let linearDistance = parseFloat(document.getElementById("linearDistance").value);
      let speed = parseFloat(document.getElementById("speed").value);
      let pickPoints = parseFloat(document.getElementById("pickPoints").value);
      let placePoints = parseFloat(document.getElementById("placePoints").value);
      let dwell = parseFloat(document.getElementById("dwell").value);
      let payload = parseFloat(document.getElementById("payload").value);

      let blend = document.getElementById("blend").value;
      let accelProfile = document.getElementById("accelProfile").value;

      let blendFactor = 1.0;
      let accelFactor = 1.0;
      let payloadFactor = 1.0;

      if(blend === "fine"){
        blendFactor = 1.0;
      } else if(blend === "medium"){
        blendFactor = 0.9;
      } else if(blend === "high"){
        blendFactor = 0.8;
      }

      if(accelProfile === "slow"){
        accelFactor = 1.15;
      } else if(accelProfile === "normal"){
        accelFactor = 1.0;
      } else if(accelProfile === "fast"){
        accelFactor = 0.9;
      }

      // Simple payload penalty
      if(payload <= 5){
        payloadFactor = 1.0;
      } else if(payload <= 10){
        payloadFactor = 1.08;
      } else if(payload <= 20){
        payloadFactor = 1.18;
      } else {
        payloadFactor = 1.3;
      }

      let totalPoints = pickPoints + placePoints;

      // Joint moves are usually faster than linear moves
      let jointMoveTime = (jointDistance / speed) * 0.85 * blendFactor * accelFactor * payloadFactor;
      let linearMoveTime = (linearDistance / speed) * 1.0 * blendFactor * accelFactor * payloadFactor;

      // Assume each point has one approach/retract style linear move
      let timePerPoint = jointMoveTime + linearMoveTime + (dwell / 1000);

      let totalCycleTime = timePerPoint * totalPoints;
      let partsPerMinute = 60 / totalCycleTime;

      document.getElementById("output").innerHTML =
        "<strong>Total Points</strong><br>" +
        totalPoints.toFixed(0) + "<br><br>" +

        "<strong>Joint Move Time</strong><br>" +
        jointMoveTime.toFixed(3) + " sec<br><br>" +

        "<strong>Linear Move Time</strong><br>" +
        linearMoveTime.toFixed(3) + " sec<br><br>" +

        "<strong>Time Per Point</strong><br>" +
        timePerPoint.toFixed(3) + " sec<br><br>" +

        "<strong>Total Cycle Time</strong><br>" +
        totalCycleTime.toFixed(3) + " sec<br><br>" +

        "<strong>Parts Per Minute</strong><br>" +
        partsPerMinute.toFixed(2);
    }
  </script>

</body>
</html>
