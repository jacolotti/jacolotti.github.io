<!DOCTYPE html>
<html>
<head>
  <title>Pneumatic Cylinder Force Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{
      font-family:Arial;
      background:#f4f4f4;
      text-align:center;
      padding:40px;
    }

    .container{
      background:white;
      padding:30px;
      max-width:500px;
      margin:auto;
      border-radius:10px;
      box-shadow:0px 0px 10px rgba(0,0,0,.1);
    }

    input{
      width:100%;
      padding:10px;
      margin:10px 0;
      font-size:16px;
      box-sizing:border-box;
    }

    button{
      padding:12px 20px;
      font-size:16px;
      background:#0077ff;
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }

    button:hover{
      background:#005ad1;
    }

    .result{
      margin-top:20px;
      font-size:18px;
      line-height:1.6;
    }

    a{
      display:inline-block;
      margin-top:20px;
      color:#0077ff;
      text-decoration:none;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Pneumatic Cylinder Force Calculator</h2>
<p>Length Units</p>
<select id="lengthUnit">
<option value="mm">Millimeters</option>
<option value="inch">Inches</option>
</select>
    <p>Pressure Units</p>
<select id="pressureUnit">
<option value="bar">Bar</option>
<option value="psi">PSI</option>
</select>
    
    <p id="boreLabel">Bore Diameter (mm)</p>
<input id="bore" type="number" value="50">

<p id="rodLabel">Rod Diameter (mm)</p>
<input id="rod" type="number" value="20">

<p id="pressureLabel">Air Pressure (bar)</p>
<input id="pressure" type="number" value="6">

    <button onclick="calculate()">Calculate</button>

    <div class="result" id="output"></div>

    <a href="index.html">← Back to Home</a>
  </div>

  <script>
    function updateLabels(){
  let lengthUnit = document.getElementById("lengthUnit").value
  let pressureUnit = document.getElementById("pressureUnit").value

  document.getElementById("boreLabel").innerText =
    "Bore Diameter (" + (lengthUnit === "inch" ? "in" : "mm") + ")"

  document.getElementById("rodLabel").innerText =
    "Rod Diameter (" + (lengthUnit === "inch" ? "in" : "mm") + ")"

  document.getElementById("pressureLabel").innerText =
    "Air Pressure (" + (pressureUnit === "psi" ? "psi" : "bar") + ")"
}
    function calculate(){

let bore = parseFloat(document.getElementById("bore").value)
let rod = parseFloat(document.getElementById("rod").value)
let pressure = parseFloat(document.getElementById("pressure").value)

let lengthUnit = document.getElementById("lengthUnit").value
let pressureUnit = document.getElementById("pressureUnit").value

// Convert inches to mm
if(lengthUnit === "inch"){
    bore = bore * 25.4
    rod = rod * 25.4
}

// Convert psi to bar
if(pressureUnit === "psi"){
    pressure = pressure * 0.0689476
}

let boreArea = Math.PI*(bore/2)*(bore/2)
let rodArea = Math.PI*(rod/2)*(rod/2)

let extendForceN = boreArea*pressure*0.1
let retractForceN = (boreArea-rodArea)*pressure*0.1

let extendForceLbf = extendForceN * 0.224809
let retractForceLbf = retractForceN * 0.224809

document.getElementById("output").innerHTML =

"Extend Force: " + extendForceN.toFixed(2) + " N<br>" +
extendForceLbf.toFixed(2) + " lbf<br><br>" +

"Retract Force: " + retractForceN.toFixed(2) + " N<br>" +
retractForceLbf.toFixed(2) + " lbf"

}
  </script>

</body>
</html>
