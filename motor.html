  <div class="container">
    <h2>Conveyor Motor Sizing Calculator</h2>

    <div class="input-group">
<label>Load Weight (kg)</label>
<input id="weight" type="number" value="50">
</div>

    <p>Conveyor Speed (m/min)</p>
    <input id="speed" type="number" value="20">

    <p>Drive Roller Diameter (mm)</p>
    <input id="diameter" type="number" value="100">

    <p>Friction Factor</p>
    <input id="friction" type="number" value="0.05" step="0.01">

    <p>Mechanical Efficiency (%)</p>
    <input id="efficiency" type="number" value="85">

    <p>Safety Factor</p>
    <input id="safety" type="number" value="1.5" step="0.1">

    <button onclick="calculate()">Calculate</button>

    <div class="result" id="output">
      Enter values and press Calculate
    </div>
  </div>

  <script>
    function calculate(){
      let weight = parseFloat(document.getElementById("weight").value);
      let speed = parseFloat(document.getElementById("speed").value);
      let diameter = parseFloat(document.getElementById("diameter").value);
      let friction = parseFloat(document.getElementById("friction").value);
      let efficiency = parseFloat(document.getElementById("efficiency").value) / 100;
      let safety = parseFloat(document.getElementById("safety").value);

      let g = 9.81;

      let force = weight * g * friction * safety;
      let radius = (diameter / 1000) / 2;
      let torque = force * radius;

      let speedMps = speed / 60;
      let powerWatts = (force * speedMps) / efficiency;
      let powerKw = powerWatts / 1000;
      let horsepower = powerWatts / 745.7;

      document.getElementById("output").innerHTML =
        "<strong>Required Force</strong><br>" +
        force.toFixed(2) + " N<br><br>" +

        "<strong>Required Torque</strong><br>" +
        torque.toFixed(2) + " N·m<br><br>" +

        "<strong>Power</strong><br>" +
        powerWatts.toFixed(2) + " W<br>" +
        powerKw.toFixed(3) + " kW<br>" +
        horsepower.toFixed(3) + " hp";
    }
  </script>
